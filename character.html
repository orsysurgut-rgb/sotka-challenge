<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Мой персонаж — Челлендж Сотка</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Manrope:wght@400;500;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: #0f0f0f;
    color: #f0f0f0;
    font-family: 'Manrope', sans-serif;
    overscroll-behavior: none;
  }

  .app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

  .header {
    background: #c8f035;
    padding: 24px 20px 20px;
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .back-btn {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }

  .header-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 22px;
    font-weight: 900;
    color: #0f0f0f;
    letter-spacing: -0.5px;
  }

  .header-sub {
    font-size: 12px;
    color: rgba(0,0,0,0.5);
    margin-top: 4px;
    font-weight: 500;
    padding-left: 44px;
  }

  .content {
    flex: 1;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .stage-label {
    font-family: 'Unbounded', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: #c8f035;
    text-align: center;
    letter-spacing: -0.3px;
  }

  .stage-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    text-align: center;
    margin-top: 4px;
  }

  .character-wrap {
    width: 220px;
    height: 320px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .muscles-grid {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .muscle-card {
    background: #1a1a1a;
    border: 1.5px solid #2a2a2a;
    border-radius: 12px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: border-color 0.3s;
  }

  .muscle-card.active {
    border-color: #c8f035;
  }

  .muscle-icon {
    font-size: 22px;
    flex-shrink: 0;
  }

  .muscle-info {
    flex: 1;
  }

  .muscle-name {
    font-size: 11px;
    font-weight: 700;
    color: #f0f0f0;
    margin-bottom: 5px;
  }

  .muscle-bar-bg {
    height: 5px;
    background: #2a2a2a;
    border-radius: 3px;
    overflow: hidden;
  }

  .muscle-bar-fill {
    height: 100%;
    background: #c8f035;
    border-radius: 3px;
    transition: width 0.8s ease;
  }

  .muscle-level {
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    margin-top: 4px;
  }

  .progress-block {
    width: 100%;
    background: #1a1a1a;
    border-radius: 14px;
    padding: 16px;
  }

  .progress-title {
    font-size: 12px;
    font-weight: 700;
    color: rgba(255,255,255,0.5);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .progress-bar-bg {
    height: 8px;
    background: #2a2a2a;
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #c8f035, #a0d020);
    border-radius: 4px;
    transition: width 1s ease;
  }

  .progress-stats {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
  }

  .progress-stat {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
  }

  .progress-stat span {
    color: #c8f035;
    font-weight: 700;
  }
</style>
</head>
