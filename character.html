<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Мой персонаж — Челлендж Сотка</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Manrope:wght@400;500;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: #0f0f0f; color: #f0f0f0; font-family: 'Manrope', sans-serif; overscroll-behavior: none; }
  .app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
  .header { background: #c8f035; padding: 24px 20px 20px; }
  .header-top { display: flex; align-items: center; gap: 12px; }
  .back-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .header-title { font-family: 'Unbounded', sans-serif; font-size: 22px; font-weight: 900; color: #0f0f0f; }
  .header-sub { font-size: 12px; color: rgba(0,0,0,0.5); margin-top: 4px; padding-left: 44px; }
  .content { flex: 1; padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 16px; overflow-y: auto; }
  .stage-label { font-family: 'Unbounded', sans-serif; font-size: 15px; font-weight: 700; color: #c8f035; text-align: center; }
  .stage-sub { font-size: 12px; color: rgba(255,255,255,0.4); text-align: center; margin-top: 4px; }
  .character-wrap { width: 100%; display: flex; justify-content: center; }
  .muscles-grid { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .muscle-card { background: #1a1a1a; border: 1.5px solid #2a2a2a; border-radius: 12px; padding: 10px 12px; display: flex; align-items: center; gap: 8px; }
  .muscle-card.active { border-color: #c8f035; }
  .muscle-icon { font-size: 20px; flex-shrink: 0; }
  .muscle-info { flex: 1; min-width: 0; }
  .muscle-name { font-size: 11px; font-weight: 700; color: #f0f0f0; margin-bottom: 4px; }
  .muscle-bar-bg { height: 4px; background: #2a2a2a; border-radius: 2px; overflow: hidden; }
  .muscle-bar-fill { height: 100%; background: #c8f035; border-radius: 2px; transition: width 0.8s ease; }
  .muscle-level { font-size: 10px; color: rgba(255,255,255,0.35); margin-top: 3px; }
  .progress-block { width: 100%; background: #1a1a1a; border-radius: 14px; padding: 14px 16px; }
  .progress-title { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.4); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .progress-bar-bg { height: 7px; background: #2a2a2a; border-radius: 4px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #c8f035, #a0d020); border-radius: 4px; transition: width 1s ease; }
  .progress-stats { display: flex; justify-content: space-between; margin-top: 8px; }
  .progress-stat { font-size: 11px; color: rgba(255,255,255,0.4); }
  .progress-stat span { color: #c8f035; font-weight: 700; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="back-btn" onclick="history.back()">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M13 4l-6 6 6 6" stroke="#0f0f0f" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="header-title">💪 Мой персонаж</div>
    </div>
    <div class="header-sub">Прокачивай мышцы каждый день</div>
  </div>

  <div class="content">
    <div>
      <div class="stage-label" id="stage-name">🥱 Новичок</div>
      <div class="stage-sub" id="stage-days">Только начинаешь — продолжай!</div>
    </div>

    <div class="character-wrap" id="character-wrap"></div>

    <div class="muscles-grid">
      <div class="muscle-card" id="card-chest">
        <div class="muscle-icon">🫁</div>
        <div class="muscle-info">
          <div class="muscle-name">Грудь</div>
          <div class="muscle-bar-bg"><div class="muscle-bar-fill" id="bar-chest" style="width:0%"></div></div>
          <div class="muscle-level" id="lvl-chest">Уровень 0</div>
        </div>
      </div>
      <div class="muscle-card" id="card-back">
        <div class="muscle-icon">🔙</div>
        <div class="muscle-info">
          <div class="muscle-name">Спина</div>
          <div class="muscle-bar-bg"><div class="muscle-bar-fill" id="bar-back" style="width:0%"></div></div>
          <div class="muscle-level" id="lvl-back">Уровень 0</div>
        </div>
      </div>
      <div class="muscle-card" id="card-legs">
        <div class="muscle-icon">🦵</div>
        <div class="muscle-info">
          <div class="muscle-name">Ноги</div>
          <div class="muscle-bar-bg"><div class="muscle-bar-fill" id="bar-legs" style="width:0%"></div></div>
          <div class="muscle-level" id="lvl-legs">Уровень 0</div>
        </div>
      </div>
      <div class="muscle-card" id="card-arms">
        <div class="muscle-icon">💪</div>
        <div class="muscle-info">
          <div class="muscle-name">Руки</div>
          <div class="muscle-bar-bg"><div class="muscle-bar-fill" id="bar-arms" style="width:0%"></div></div>
          <div class="muscle-level" id="lvl-arms">Уровень 0</div>
        </div>
      </div>
      <div class="muscle-card" id="card-abs">
        <div class="muscle-icon">⚡</div>
        <div class="muscle-info">
          <div class="muscle-name">Пресс</div>
          <div class="muscle-bar-bg"><div class="muscle-bar-fill" id="bar-abs" style="width:0%"></div></div>
          <div class="muscle-level" id="lvl-abs">Уровень 0</div>
        </div>
      </div>
      <div class="muscle-card" id="card-core">
        <div class="muscle-icon">🎯</div>
        <div class="muscle-info">
          <div class="muscle-name">Кор</div>
          <div class="muscle-bar-bg"><div class="muscle-bar-fill" id="bar-core" style="width:0%"></div></div>
          <div class="muscle-level" id="lvl-core">Уровень 0</div>
        </div>
      </div>
    </div>

    <div class="progress-block">
      <div class="progress-title">Общий прогресс челленджа</div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="overall-bar" style="width:0%"></div>
      </div>
      <div class="progress-stats">
        <div class="progress-stat">День <span id="stat-day">0</span> из 30</div>
        <div class="progress-stat"><span id="stat-pct">0</span>% выполнено</div>
      </div>
    </div>
  </div>
</div>

<script>
var tg = window.Telegram && window.Telegram.WebApp;
if (tg) tg.ready();

function lerp(a, b, t) { return a + (b - a) * Math.max(0, Math.min(1, t)); }

function muscleColor(pts) {
  if (pts >= 20) return '#c8f035';
  if (pts >= 12) return '#8ab828';
  if (pts >= 5)  return '#4a6614';
  return '#333333';
}

function buildMaleSVG(m) {
  var cW  = Math.round(lerp(10, 17, m.chest / 25));
  var aW  = Math.round(lerp(12, 21, m.arms  / 25));
  var lW  = Math.round(lerp(16, 25, m.legs  / 25));
  var sR  = Math.round(lerp(8,  14, (m.arms + m.chest) / 40));
  var cC  = muscleColor(m.chest);
  var aC  = muscleColor(m.arms);
  var lC  = muscleColor(m.legs);
  var abC = muscleColor(m.abs + m.core);

  var abs = '';
  var absPts = m.abs + m.core;
  var absCols = [
    absPts >= 3  ? abC : '#2a2a2a',
    absPts >= 6  ? abC : '#2a2a2a',
    absPts >= 9  ? abC : '#2a2a2a',
    absPts >= 12 ? abC : '#2a2a2a',
    absPts >= 15 ? abC : '#2a2a2a',
    absPts >= 18 ? abC : '#2a2a2a'
  ];
  abs += '<rect x="33" y="60" width="6" height="5" rx="1.5" fill="' + absCols[0] + '"/>';
  abs += '<rect x="41" y="60" width="6" height="5" rx="1.5" fill="' + absCols[1] + '"/>';
  abs += '<rect x="33" y="68" width="6" height="5" rx="1.5" fill="' + absCols[2] + '"/>';
  abs += '<rect x="41" y="68" width="6" height="5" rx="1.5" fill="' + absCols[3] + '"/>';
  abs += '<rect x="33" y="76" width="6" height="5" rx="1.5" fill="' + absCols[4] + '"/>';
  abs += '<rect x="41" y="76" width="6" height="5" rx="1.5" fill="' + absCols[5] + '"/>';

  var aLx = 13 - Math.round(aW / 2);
  var aRx = 67 - Math.round(aW / 2);
  var lRx = 58 - lW;

  var svg = '<svg width="160" height="280" viewBox="0 0 80 160" fill="none" xmlns="http://www.w3.org/2000/svg">';
  // Голова
  svg += '<circle cx="40" cy="18" r="14" fill="#3a3a3a" stroke="#c8f035" stroke-width="1.5"/>';
  svg += '<path d="M27 14 Q40 4 53 14" fill="#222"/>';
  svg += '<ellipse cx="26" cy="18" rx="3" ry="4" fill="#3a3a3a" stroke="#555" stroke-width="0.8"/>';
  svg += '<ellipse cx="54" cy="18" rx="3" ry="4" fill="#3a3a3a" stroke="#555" stroke-width="0.8"/>';
  svg += '<ellipse cx="36" cy="19" rx="2" ry="2.5" fill="#555"/>';
  svg += '<ellipse cx="44" cy="19" rx="2" ry="2.5" fill="#555"/>';
  svg += '<path d="M36 24 Q40 27 44 24" stroke="#555" stroke-width="1" fill="none" stroke-linecap="round"/>';
  // Шея
  svg += '<rect x="35" y="30" width="10" height="8" rx="3" fill="#3a3a3a"/>';
  svg += '<path d="M35 31 Q28 33 22 37" stroke="#444" stroke-width="3" stroke-linecap="round"/>';
  svg += '<path d="M45 31 Q52 33 58 37" stroke="#444" stroke-width="3" stroke-linecap="round"/>';
  // Туловище
  svg += '<path d="M18 38 Q18 36 22 36 L58 36 Q62 36 62 38 L60 86 Q60 90 56 90 L24 90 Q20 90 20 86 Z" fill="#2a2a2a" stroke="#444" stroke-width="1"/>';
  // Грудь
  svg += '<ellipse cx="33" cy="50" rx="' + cW + '" ry="' + Math.round(cW*0.75) + '" fill="' + cC + '"/>';
  svg += '<ellipse cx="47" cy="50" rx="' + cW + '" ry="' + Math.round(cW*0.75) + '" fill="' + cC + '"/>';
  svg += '<path d="M40 40 L40 60" stroke="#1a1a1a" stroke-width="1"/>';
  // Пресс
  svg += abs;
  // Плечи
  svg += '<ellipse cx="18" cy="40" rx="' + sR + '" ry="' + Math.round(sR*0.85) + '" fill="#2a2a2a" stroke="' + aC + '" stroke-width="1"/>';
  svg += '<ellipse cx="62" cy="40" rx="' + sR + '" ry="' + Math.round(sR*0.85) + '" fill="#2a2a2a" stroke="' + aC + '" stroke-width="1"/>';
  // Руки
  svg += '<rect x="' + aLx + '" y="46" width="' + aW + '" height="30" rx="' + Math.round(aW/2) + '" fill="' + aC + '" stroke="#1a1a1a" stroke-width="0.8"/>';
  svg += '<rect x="' + aRx + '" y="46" width="' + aW + '" height="30" rx="' + Math.round(aW/2) + '" fill="' + aC + '" stroke="#1a1a1a" stroke-width="0.8"/>';
  // Предплечья
  svg += '<rect x="10" y="74" width="10" height="24" rx="5" fill="#2a2a2a" stroke="#444" stroke-width="1"/>';
  svg += '<rect x="60" y="74" width="10" height="24" rx="5" fill="#2a2a2a" stroke="#444" stroke-width="1"/>';
  // Пояс
  svg += '<rect x="22" y="88" width="36" height="12" rx="4" fill="#1e1e1e" stroke="#444" stroke-width="1"/>';
  svg += '<rect x="37" y="91" width="6" height="6" rx="1" fill="#333" stroke="#c8f035" stroke-width="0.8"/>';
  // Ноги
  svg += '<rect x="22" y="98" width="' + lW + '" height="38" rx="7" fill="' + lC + '" stroke="#1a1a1a" stroke-width="0.8"/>';
  svg += '<rect x="' + lRx + '" y="98" width="' + lW + '" height="38" rx="7" fill="' + lC + '" stroke="#1a1a1a" stroke-width="0.8"/>';
  svg += '<path d="M40 98 L40 112" stroke="#1a1a1a" stroke-width="1.5"/>';
  // Голени
  svg += '<rect x="24" y="134" width="13" height="20" rx="6" fill="#2a2a2a" stroke="#444" stroke-width="1"/>';
  svg += '<rect x="43" y="134" width="13" height="20" rx="6" fill="#2a2a2a" stroke="#444" stroke-width="1"/>';
  // Стопы
  svg += '<ellipse cx="31" cy="155" rx="11" ry="5" fill="#1e1e1e" stroke="#444" stroke-width="1"/>';
  svg += '<ellipse cx="50" cy="155" rx="11" ry="5" fill="#1e1e1e" stroke="#444" stroke-width="1"/>';
  svg += '</svg>';
  return svg;
}

function renderCharacter(muscles) {
  var wrap = document.getElementById('character-wrap');
  if (wrap) wrap.innerHTML = buildMaleSVG(muscles);
}

function muscleLevel(pts) { return Math.min(10, Math.floor(pts / 3)); }
function musclePct(pts)   { return Math.min(100, Math.round((pts / 30) * 100)); }

function getStage(d) {
  if (d < 7)  return { name: '🥱 Новичок',    sub: 'Только начинаешь — продолжай!' };
  if (d < 13) return { name: '😤 Втягиваюсь', sub: 'Уже виден небольшой прогресс' };
  if (d < 19) return { name: '💪 В форме',     sub: 'Мышцы начинают расти!' };
  if (d < 25) return { name: '🔥 Спортсмен',   sub: 'Серьёзный прогресс!' };
  return             { name: '⚡ Зверь',        sub: 'Ты на пике формы!' };
}

function calcMuscles(log) {
  var m = { chest:0, back:0, legs:0, arms:0, abs:0, core:0 };
  var map = {
    pushups:   { chest:2, arms:1 },
    pullups:   { back:2,  arms:2 },
    squats:    { legs:3 },
    dips:      { arms:2,  chest:1 },
    crunches:  { abs:3 },
    kneeraise: { abs:2,   core:2 },
    lunges:    { legs:3,  core:1 }
  };
  Object.keys(log).forEach(function(date) {
    var day = log[date];
    if (!day) return;
    Object.keys(day).forEach(function(ex) {
      if (!map[ex]) return;
      var sets = day[ex];
      var hasSets = Array.isArray(sets) && sets.some(function(s){ return s > 0; });
      if (!hasSets) return;
      Object.keys(map[ex]).forEach(function(muscle) {
        m[muscle] += map[ex][muscle];
      });
    });
  });
  return m;
}

function updateCards(muscles) {
  ['chest','back','legs','arms','abs','core'].forEach(function(k) {
    var pts = muscles[k];
    var barEl = document.getElementById('bar-' + k);
    var lvlEl = document.getElementById('lvl-' + k);
    var cardEl = document.getElementById('card-' + k);
    if (barEl) barEl.style.width = musclePct(pts) + '%';
    if (lvlEl) lvlEl.textContent = 'Уровень ' + muscleLevel(pts);
    if (cardEl && muscleLevel(pts) > 0) cardEl.classList.add('active');
  });
}

function loadData(cb) {
  if (tg && tg.CloudStorage) {
    tg.CloudStorage.getItems(['startDate','log'], function(err, data) {
      if (err || !data) return cb({ startDate: null, log: {} });
      var log = {};
      try { log = JSON.parse(data.log || '{}'); } catch(e) {}
      cb({ startDate: data.startDate || null, log: log });
    });
  } else {
    var log = {};
    try { log = JSON.parse(localStorage.getItem('log') || '{}'); } catch(e) {}
    cb({ startDate: localStorage.getItem('startDate'), log: log });
  }
}

// Сначала рисуем сразу с нулями
var empty = { chest:0, back:0, legs:0, arms:0, abs:0, core:0 };
renderCharacter(empty);

// Потом грузим данные
loadData(function(data) {
  var log = data.log || {};

  var daysPassed = 0;
  if (data.startDate) {
    var diff = new Date() - new Date(data.startDate);
    daysPassed = Math.max(0, Math.min(30, Math.floor(diff / 86400000)));
  }

  var stage = getStage(daysPassed);
  document.getElementById('stage-name').textContent = stage.name;
  document.getElementById('stage-days').textContent = stage.sub;

  var totalDays = Object.keys(log).length;
  var pct = Math.round((totalDays / 30) * 100);
  document.getElementById('overall-bar').style.width = pct + '%';
  document.getElementById('stat-day').textContent = daysPassed;
  document.getElementById('stat-pct').textContent = pct;

  var muscles = calcMuscles(log);
  updateCards(muscles);
  renderCharacter(muscles);
});
</script>
</body>
</html>
